name: Bug report
description: Report a reproducible problem in the PatientMatch storefront.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve PatientMatch.

        Do not include personal health information, contact details, ZIP codes, diagnoses, screener answers, or other sensitive personal data. If this is a security or privacy issue, email security@patientmatch.health instead of opening a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use synthetic or non-sensitive example data only.
      placeholder: |
        1. Go to ...
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Affected route or component
      placeholder: /trials, /trial/[nct_id]/screen, PublicTrialCard
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, or local development details.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include PHI/PII, real patient details, screener answers, contact details, or ZIP codes.
          required: true
