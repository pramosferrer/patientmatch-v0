name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    env:
      PII_SECRET: local-ci-secret-for-builds-only-00000000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: local-demo-anon-key
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: local-demo-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Demo fixture check
        run: npm run demo:check

      - name: Build
        run: npm run build
